spring:
  application:
    name: jobdesk-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/jobdesk}
    username: ${DATABASE_USER:jobdesk}
    password: ${DATABASE_PASSWORD:jobdesk}

  jpa:
    hibernate:
      # Le schéma existe déjà (créé par Doctrine) — on ne fait que le VALIDER.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    # Base VIERGE (prod) : V1__init_schema.sql crée le schéma.
    # Base DÉJÀ peuplée (dev, héritée de Doctrine) : baselinée à la version 1,
    # donc V1 est considéré comme déjà appliqué et n'est PAS rejoué (données préservées).
    baseline-on-migrate: true
    baseline-version: 1
    # Ignore la table de migration Doctrine laissée en place.
    validate-on-migrate: false

  # Relais SMTP (Brevo en production). Hôte vide = envoi désactivé : les mails sont
  # alors journalisés au lieu d'être envoyés, ce qui permet de développer sans SMTP.
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          # Sans timeout, une panne du relais bloquerait le thread indéfiniment.
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
  tomcat:
    # Le frontend envoie des params non encodés type order[createdAt]=desc.
    # Tomcat rejette [ ] par défaut (400) → on les autorise dans la query string.
    relaxed-query-chars: "[,]"

app:
  # Clé de chiffrement AES-256-GCM des tokens Gmail — DOIT être identique à l'APP_SECRET
  # de l'ancien backend Symfony pour déchiffrer les données existantes.
  encryption-secret: ${APP_SECRET:change_me_generate_a_32_char_secret}
  jwt:
    # HS256. Par défaut on réutilise APP_SECRET ; overridable via JWT_SECRET.
    secret: ${JWT_SECRET:${APP_SECRET:change_me_generate_a_32_char_secret}}
    # Access token volontairement court (15 min) : non révocable, sa fuite est vite périmée.
    # La session est maintenue par le refresh token (voir app.refresh).
    ttl-seconds: 900
  refresh:
    # Durée de vie d'une session sans reconnexion : 30 jours. Le refresh token est
    # révocable et tourne à chaque usage (voir RefreshTokenService).
    ttl-seconds: 2592000
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  cors-allow-origin: ${CORS_ALLOW_ORIGIN:http://localhost:3000}
  # Microservice de rendu headless (repli anti-bot/SPA du scraper). Vide = désactivé.
  playwright-url: ${PLAYWRIGHT_URL:}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
  mail:
    # Expéditeur des mails transactionnels. Doit être un expéditeur validé chez Brevo.
    from: ${EMAIL_FROM:}
  password-reset:
    # Durée de validité du lien de réinitialisation (1 h).
    ttl-seconds: 3600
  retention:
    # Limitation de conservation (RGPD art. 5) : ancienneté au-delà de laquelle les
    # journaux de scan Gmail sont purgés. Ne concerne ni les comptes ni les candidatures.
    mail-scan-days: 365

logging:
  level:
    org.hibernate.tool.schema: warn
