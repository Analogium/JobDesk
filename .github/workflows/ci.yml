name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend (Maven + JUnit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # `verify` compile et lance les tests JUnit (base H2 en mémoire, aucun service requis).
      - name: Maven verify
        run: mvn -B --no-transfer-progress verify
        working-directory: backend-java

  # ────────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend (ESLint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

  # ────────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Run Vitest
        run: npm run test
        working-directory: frontend

  # ────────────────────────────────────────────────────────────────────────────
  # Valide les Dockerfile AVANT de toucher la prod : un build cassé échoue ici,
  # pas sur le VPS avec les containers déjà arrêtés.
  build-check:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t jobdesk-backend:ci ./backend-java

      - name: Build frontend image (prod target)
        run: docker build --target prod -t jobdesk-frontend:ci ./frontend

  # ────────────────────────────────────────────────────────────────────────────
  # Déploiement continu : uniquement sur push master, une fois tout le CI vert.
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    # Un seul déploiement à la fois ; on ne coupe jamais un déploiement en cours.
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Clé d'hôte épinglée : pas de TOFU, la connexion échoue si le serveur change.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Pull & redeploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          REMOTE_SCRIPT=$(cat <<'REMOTE'
          set -euo pipefail

          REPO=/home/lambert/apps/JobDesk
          STACK=/home/lambert/apps
          SERVICES="jobdesk-backend jobdesk-frontend jobdesk-playwright"

          cd "$REPO"
          git fetch --prune origin
          # --ff-only : si le checkout du VPS a divergé (modif locale, hotfix),
          # le déploiement échoue bruyamment au lieu d'écraser silencieusement.
          git pull --ff-only origin master
          echo "→ déployé : $(git rev-parse --short HEAD) $(git log -1 --pretty=%s)"

          cd "$STACK"
          docker compose build $SERVICES
          docker compose up -d $SERVICES
          # Les anciennes images (une par build) rempliraient le disque du VPS.
          docker image prune -f
          REMOTE
          )

          # -4 : le runner GitHub n'a pas d'IPv6 globale alors que l'hôte publie un AAAA ;
          #      sans ça, ssh peut s'obstiner sur l'adresse v6 et consommer tout le budget
          #      de retransmission TCP (~2 min) avant d'échouer.
          # ConnectTimeout : borne chaque tentative, sinon un échec coûte 2 min de runner.
          # CheckHostIP=no : known_hosts épingle le nom d'hôte, pas l'IP (qui peut varier).
          for attempt in 1 2 3; do
            if printf '%s' "$REMOTE_SCRIPT" | ssh -4 -i ~/.ssh/deploy_key -p "$VPS_PORT" \
                 -o IdentitiesOnly=yes -o BatchMode=yes -o CheckHostIP=no \
                 -o ConnectTimeout=20 -o ServerAliveInterval=30 \
                 "$VPS_USER@$VPS_HOST" 'bash -s'; then
              exit 0
            fi
            echo "⚠️ tentative $attempt échouée"
            if [ "$attempt" != 3 ]; then sleep 15; fi
          done
          echo "❌ impossible de déployer après 3 tentatives"
          exit 1

      - name: Smoke test
        env:
          API_URL: https://apijobdesk.theolambert.dev
          APP_URL: https://jobdesk.theolambert.dev
        run: |
          # Spring Boot met ~20 s à démarrer : on laisse le temps avant de conclure.
          for attempt in $(seq 1 12); do
            api=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/api/applications" || echo 000)
            app=$(curl -s -o /dev/null -w '%{http_code}' "$APP_URL/auth/login" || echo 000)
            # 401 = l'API tourne et exige bien un JWT ; 200 = le front SSR répond.
            if [ "$api" = "401" ] && [ "$app" = "200" ]; then
              echo "✅ API 401 (authentification requise) / front 200"
              exit 0
            fi
            echo "tentative $attempt : api=$api front=$app — nouvelle vérification dans 10 s"
            sleep 10
          done
          echo "❌ services injoignables après 2 min (api=$api front=$app)"
          exit 1
