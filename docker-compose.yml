services:
  playwright:
    build:
      context: ./playwright-scraper
    container_name: jobdesk_playwright
    restart: unless-stopped
    networks:
      - internal

  # Ancien backend Symfony — CONSERVÉ mais non démarré par défaut (profil "legacy").
  # Pour le relancer en secours :  docker compose --profile legacy up -d backend nginx
  # (⚠️ il écoute aussi sur 8000 via nginx : arrêter backend-java avant.)
  backend:
    build:
      context: ./backend
      target: dev
    container_name: jobdesk_backend
    profiles: ["legacy"]
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      DATABASE_URL: "postgresql://jobdesk:jobdesk@postgres:5432/jobdesk?serverVersion=15&charset=utf8"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-changeme}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$"
      PLAYWRIGHT_URL: http://playwright:3001
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      playwright:
        condition: service_started

  # Sert l'ancien backend PHP-FPM — conservé avec lui derrière le profil "legacy".
  nginx:
    image: nginx:alpine
    container_name: jobdesk_nginx
    profiles: ["legacy"]
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend/public:/var/www/html/public:ro
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      - backend

  # Backend Spring Boot — backend PAR DÉFAUT (démarre avec `docker compose up`).
  # Écoute sur http://localhost:8000 et partage la base postgres.
  backend-java:
    build:
      context: ./backend-java
    container_name: jobdesk_backend_java
    restart: unless-stopped
    ports:
      # Sur le port 8000 : remplace l'ancien backend. Le frontend (NUXT_PUBLIC_API_URL=
      # http://localhost:8000) et le redirect Google (localhost:8000/auth/google/check,
      # déjà enregistré) fonctionnent sans autre changement.
      - "8000:8080"
    environment:
      DATABASE_URL: "jdbc:postgresql://postgres:5432/jobdesk"
      DATABASE_USER: jobdesk
      DATABASE_PASSWORD: jobdesk
      APP_SECRET: ${APP_SECRET:-change_me_generate_a_32_char_secret}
      # JWT_SECRET non défini volontairement : l'app signe les JWT avec APP_SECRET par défaut.
      # (Ne pas passer une valeur vide ici : Spring l'interpréterait comme un secret vide.)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      CORS_ALLOW_ORIGIN: http://localhost:3000
      PLAYWRIGHT_URL: http://playwright:3001
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: jobdesk_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      NUXT_PUBLIC_API_URL: http://localhost:8000
      # Mentions légales : valeurs réelles à définir dans le .env local (ou en prod).
      # Laissées vides, les pages affichent « À compléter ». L'adresse postale n'est pas
      # publiée (particulier non-professionnel, art. 6-III-2 LCEN) : détenue par l'hébergeur.
      NUXT_PUBLIC_LEGAL_EDITOR: ${LEGAL_EDITOR:-}
      NUXT_PUBLIC_LEGAL_STATUS: ${LEGAL_STATUS:-}
      NUXT_PUBLIC_LEGAL_CONTACT: ${LEGAL_CONTACT:-}
    networks:
      - internal

  postgres:
    image: postgres:15-alpine
    container_name: jobdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobdesk
      POSTGRES_USER: jobdesk
      POSTGRES_PASSWORD: jobdesk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobdesk"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  internal:

volumes:
  postgres_data:
